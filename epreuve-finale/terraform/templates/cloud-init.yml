#cloud-config
package_update: true
packages:
  - apache2
  - php
  - libapache2-mod-php
  - php-mysql
write_files:
  - path: /var/www/html/index.php
    content: |
      <?php
        $host = gethostname();
        echo "<h1>NovaRetail - serveur web ${server_index}</h1>";
        echo "<p>Machine : " . htmlspecialchars($host) . "</p>";
        echo "<p>Application de gestion de commandes deployee avec Terraform sur Azure.</p>";
      ?>
runcmd:
  - rm -f /var/www/html/index.html
  - systemctl enable apache2
  - systemctl restart apache2
